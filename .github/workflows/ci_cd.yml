name: Universal Extractor & Mega Upload (Matrix)

on:
  workflow_dispatch:
    inputs:
      total_machines:
        description: 'Kitni machines chahiye? (default: 20, max: 30)'
        required: false
        default: '20'
      zip_enabled:
        description: 'ZIP karo agar files > 1300? (true/false)'
        required: false
        default: 'true'
  push:
    paths:
      - 'Inputs/**'

# ─────────────────────────────────────────────────────────────────────
# STEP 1 — Pehle sirf file list banao (ek baar, coordinator job)
# ─────────────────────────────────────────────────────────────────────
jobs:

  setup:
    name: "📋 File List Banao"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      total_machines: ${{ steps.build.outputs.total_machines }}
      zip_enabled: ${{ steps.build.outputs.zip_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Matrix
        id: build
        run: |
          # Input se machines count lo — default 20
          MACHINES="${{ github.event.inputs.total_machines }}"
          MACHINES="${MACHINES:-20}"
          # Max 30 tak hi allow karo
          if [ "$MACHINES" -gt 30 ]; then MACHINES=30; fi

          ZIP="${{ github.event.inputs.zip_enabled }}"
          ZIP="${ZIP:-true}"

          echo "total_machines=$MACHINES" >> $GITHUB_OUTPUT
          echo "zip_enabled=$ZIP"         >> $GITHUB_OUTPUT

          # Machine indices: [0, 1, 2, ... N-1]
          INDICES=$(python3 -c "
          import json
          n = int('$MACHINES')
          print(json.dumps(list(range(n))))
          ")
          echo "matrix={\"machine_index\":$INDICES}" >> $GITHUB_OUTPUT

          echo "✅ Machines: $MACHINES | ZIP: $ZIP"
          echo "📋 Matrix: $INDICES"

# ─────────────────────────────────────────────────────────────────────
# STEP 2 — Matrix: N machines parallel chalao
# ─────────────────────────────────────────────────────────────────────
  extract-and-upload:
    name: "🤖 Node ${{ matrix.machine_index }} / Extract & Upload"
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # ek machine fail ho to baaki chalta rahe
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      MACHINE_INDEX:   ${{ matrix.machine_index }}
      TOTAL_MACHINES:  ${{ needs.setup.outputs.total_machines }}
      ZIP_ENABLED:     ${{ needs.setup.outputs.zip_enabled }}
      ZIP_FILE_LIMIT:  1300        # agar extracted files > yeh → zip
      UPLOAD_TRANSFERS: 2          # rclone transfers per machine (1-2)
      RCLONE_PASS:     ${{ secrets.RCLONE_CONFIG_PASSWORD }}

    steps:

      # ── Checkout ──────────────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ── Python Setup ──────────────────────────────────────────────
      - name: "🐍 Python Setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Install Dependencies"
        run: pip install requests python-dotenv

      # ── Rclone Install ────────────────────────────────────────────
      - name: "⚙️ Install Rclone"
        run: |
          sudo -v
          curl https://rclone.org/install.sh | sudo bash

      # ── Rclone Decrypt ────────────────────────────────────────────
      - name: "🔐 Decrypt Rclone Config"
        run: |
          mkdir -p ~/.config/rclone
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 600000 \
            -in rclone.conf.enc \
            -out ~/.config/rclone/rclone.conf \
            -pass pass:$RCLONE_PASS
          echo "✅ rclone config decrypted"

      # ── Extraction ────────────────────────────────────────────────
      - name: "🔍 Extract (Node ${{ matrix.machine_index }}/${{ needs.setup.outputs.total_machines }})"
        run: |
          echo "════════════════════════════════════════"
          echo "  NODE $MACHINE_INDEX of $TOTAL_MACHINES"
          echo "  Apni assigned files process karega"
          echo "════════════════════════════════════════"
          python worker.py --mode extract

      # ── Upload ────────────────────────────────────────────────────
      - name: "☁️ Upload to Mega (Node ${{ matrix.machine_index }})"
        run: |
          echo "════════════════════════════════════════"
          echo "  NODE $MACHINE_INDEX — Mega Upload"
          echo "  ZIP_ENABLED=$ZIP_ENABLED"
          echo "  TRANSFERS=$UPLOAD_TRANSFERS"
          echo "════════════════════════════════════════"
          python worker.py --mode upload
